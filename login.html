<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | TaskFlow</title>

    <link rel="stylesheet" href="css/variables.css">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/login.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">


</head>

<body>



    <div class="login-container">

        <div class="login-card">

            <div class="login-header">

                <h1>

                    TaskFlow

                </h1>

                <p>

                    Bienvenido de nuevo 👋

                </p>

                <span>

                    Inicia sesión para acceder a tus proyectos.

                </span>

            </div>

            <form id="loginForm" class="login-form">

                <div class="input-group">

                    <label for="email">

                        Correo electrónico

                    </label>

                    <div class="input-icon">

                        <i class="fa-solid fa-envelope"></i>

                        <input id="email" type="email" placeholder="ejemplo@email.com" required>

                    </div>

                </div>

                <div class="input-group">

                    <label for="password">

                        Contraseña

                    </label>

                    <div class="input-icon">



                        <input id="password" type="password" placeholder="Introduce tu contraseña" required>

                        <button type="button" class="toggle-password">

                            <i class="fa-solid fa-eye"></i>

                        </button>

                    </div>

                </div>
                <div class="remember">

                    <label>

                        <input type="checkbox">

                        Recordarme

                    </label>

                </div>

                <button type="submit">

                    Iniciar sesión

                </button>

            </form>

            <div class="login-footer">
                <p>
                    ¿No tienes cuenta?
                    <a href="#">
                        Regístrate
                    </a>
                </p>
            </div>

        </div>

    </div>
    <script src="js/storage.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/login.js"></script>
    <script src="js/tasks/taskForm.js"></script>
    <script src="js/tasks/taskCounter.js"></script>
    <script src="js/tasks/taskEdit.js"></script>
    <script src="js/tasks/taskDelete.js"></script>
    <script src="js/tasks/taskStatus.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/app.js"></script>

</body>
