<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva tarea | TaskFlow</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/task.css">
    <link rel="stylesheet" href="css/toast.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>



<body>

    <!-- Contenedor principal -->
    <div class="task-container">

        <!-- Tarjeta -->
        <div class="task-card">

            <!-- Cabecera -->
            <header class="task-header">
                <h1>Nueva tarea</h1>
                <p>Organiza tu trabajo creando una nueva tarea.</p>
            </header>

            <!-- Formulario -->
            <form id="taskForm" class="task-form">

                <!-- Título -->
                <div class="form-group">
                    <label for="title">Título</label>
                    <input id="title" type="text" maxlength="60" placeholder="Ejemplo: Diseñar página de Login">
                </div>

                <!-- Descripción -->
                <div class="form-group">
                    <label for="description">Descripción</label>

                    <textarea id="description" maxlength="250" placeholder="Describe la tarea..."></textarea>

                    <small id="descriptionCounter">
                        0 / 250 caracteres
                    </small>
                </div>

                <!-- Prioridad -->
                <div class="form-group">
                    <label for="priority">Prioridad</label>

                    <select id="priority">
                        <option value="">Selecciona prioridad</option>
                        <option value="Alta">Alta</option>
                        <option value="Media">Media</option>
                        <option value="Baja">Baja</option>
                    </select>
                </div>

                <!-- Fecha -->
                <div class="form-group">
                    <label for="date">Fecha límite</label>
                    <input id="date" type="date">
                </div>

                <!-- Categoría -->
                <div class="form-group">
                    <label for="category">Categoría</label>

                    <select id="category">
                        <option value="">Selecciona categoría</option>
                        <option value="Desarrollo">Desarrollo</option>
                        <option value="Diseño">Diseño</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Personal">Personal</option>
                    </select>
                </div>

                <!-- Botón -->
                <button type="submit">
                    Crear tarea
                </button>

            </form>

        </div>

    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- JavaScript -->


    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
    <script src="js/storage.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/login.js"></script>
    <script src="js/tasks/taskForm.js"></script>
    <script src="js/tasks/taskCounter.js"></script>
    <script src="js/tasks/taskEdit.js"></script>
    <script src="js/tasks/taskDelete.js"></script>
    <script src="js/tasks/taskStatus.js"></script>
    <script src="js/dashboard/filters.js"></script>
    <script src="js/dashboard/search.js"></script>
    <script src="js/dashboard/sorting.js"></script>
    <script src="js/dashboard/taskFilters.js"></script>
    <script src="js/dashboard/taskCard.js"></script>
    <script src="js/dashboard/taskEvents.js"></script>
    <script src="js/dashboard/stats.js"></script>
    <script src="js/dashboard/dashboard.js"></script>
    <script src="js/dashboard/stats.js"></script>
    <script src="js/dashboard/summary.js"></script>
    <script src="js/dashboard/charts.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard/notifications.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/dashboard/export.js"></script>

</body>

</html>
