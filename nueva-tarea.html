<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva tarea | TaskFlow</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/task.css">
    <link rel="stylesheet" href="css/toast.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<script src="js/storage.js"></script>
<script src="js/toast.js"></script>
<script src="js/login.js"></script>
<script src="js/tasks.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/app.js"></script>

<body>

    <!-- Contenedor principal -->
    <div class="task-container">

        <!-- Tarjeta -->
        <div class="task-card">

            <!-- Cabecera -->
            <header class="task-header">
                <h1>Nueva tarea</h1>
                <p>Organiza tu trabajo creando una nueva tarea.</p>
            </header>

            <!-- Formulario -->
            <form id="taskForm" class="task-form">

                <!-- Título -->
                <div class="form-group">
                    <label for="title">Título</label>
                    <input
                        id="title"
                        type="text"
                        maxlength="60"
                        placeholder="Ejemplo: Diseñar página de Login">
                </div>

                <!-- Descripción -->
                <div class="form-group">
                    <label for="description">Descripción</label>

                    <textarea
                        id="description"
                        maxlength="250"
                        placeholder="Describe la tarea..."></textarea>

                    <small id="descriptionCounter">
                        0 / 250 caracteres
                    </small>
                </div>

                <!-- Prioridad -->
                <div class="form-group">
                    <label for="priority">Prioridad</label>

                    <select id="priority">
                        <option value="">Selecciona prioridad</option>
                        <option value="Alta">Alta</option>
                        <option value="Media">Media</option>
                        <option value="Baja">Baja</option>
                    </select>
                </div>

                <!-- Fecha -->
                <div class="form-group">
                    <label for="date">Fecha límite</label>
                    <input id="date" type="date">
                </div>

                <!-- Categoría -->
                <div class="form-group">
                    <label for="category">Categoría</label>

                    <select id="category">
                        <option value="">Selecciona categoría</option>
                        <option value="Desarrollo">Desarrollo</option>
                        <option value="Diseño">Diseño</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Personal">Personal</option>
                    </select>
                </div>

                <!-- Botón -->
                <button type="submit">
                    Crear tarea
                </button>

            </form>

        </div>

    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- JavaScript -->
    <script src="js/app.js"></script>

</body>

</html>
